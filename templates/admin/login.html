<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — CatalogPro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#131211;--red:#c23b26;--line:#e8e2d9;--bg:#faf8f3}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.07)}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:6px}
.logo em{color:var(--red);font-style:normal}
.subtitle{font-size:.78rem;color:#a09890;text-align:center;margin-bottom:28px}
label{display:block;font-size:.76rem;color:#6b6460;margin-bottom:6px;margin-top:16px}
label:first-of-type{margin-top:0}
input{width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:9px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--ink);outline:none;transition:border-color .2s}
input:focus{border-color:var(--ink);background:#fff}
.submit{width:100%;margin-top:22px;padding:14px;background:var(--ink);color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:500;cursor:pointer;transition:background .2s}
.submit:hover{background:#2a2520}
.err{background:#fdf2f2;border:1px solid #f5c6c6;border-left:3px solid var(--red);border-radius:8px;padding:10px 14px;font-size:.82rem;color:var(--red);margin-bottom:16px}
.locked{background:#fffbeb;border:1px solid #fde68a;border-left:3px solid #f59e0b;border-radius:8px;padding:14px;font-size:.84rem;color:#78350f;text-align:center}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><em>Catalog</em>Pro</div>
  <div class="subtitle">Admin Access</div>

  {% with msgs = get_flashed_messages() %}
    {% for m in msgs %}<div class="err">{{ m }}</div>{% endfor %}
  {% endwith %}

  {% if locked %}
  <div class="locked">
    🔒 Too many failed attempts.<br>
    Please wait {{ remaining }} minutes before trying again.
  </div>
  {% else %}
  <form method="POST">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <label>Username</label>
    <input type="text" name="username" required autofocus autocomplete="username">
    <label>Password</label>
    <input type="password" name="password" required autocomplete="current-password">
    <button class="submit" type="submit">Sign in →</button>
  </form>
  {% endif %}
</div>
</body>
</html>
