<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}CatalogPro{% endblock %}</title>
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafaf8;--ink:#111;--mid:#555;--pale:#888;--line:#e4e0da;--red:#c0392b;--gold:#a07830;--card:#fff;--nav-h:60px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.top{height:var(--nav-h);background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 36px;gap:16px;position:sticky;top:0;z-index:50}
.logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;text-decoration:none;color:var(--ink);display:flex;align-items:center;gap:8px}
.logo span{color:var(--red)}
.logo-img{height:34px;width:auto;display:none;object-fit:contain}
.top-back{margin-left:auto;font-size:0.82rem;color:var(--pale);text-decoration:none}
.top-back:hover{color:var(--ink)}
.badge{display:inline-block;background:#f4f1ec;border:1px solid var(--line);color:var(--mid);font-size:0.72rem;padding:3px 12px;border-radius:99px}
.wrap{max-width:700px;margin:0 auto;padding:36px 24px 80px}
/* Cards */
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;margin-bottom:20px}
.card-title{font-size:0.7rem;font-weight:600;color:var(--pale);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--line)}
/* Form */
label{display:block;font-size:0.78rem;color:var(--mid);margin-bottom:5px;margin-top:14px}
label:first-child{margin-top:0}
input[type=text],input[type=email],input[type=tel],textarea,select{width:100%;background:#fafaf8;border:1px solid var(--line);border-radius:7px;padding:10px 13px;color:var(--ink);font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
input:focus,textarea:focus,select:focus{border-color:var(--ink);background:#fff}
textarea{resize:vertical;min-height:72px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.opt{font-size:0.72rem;color:var(--pale);margin-left:4px}
/* Themes */
.themes-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.t-opt{cursor:pointer;padding:8px 14px;border-radius:7px;border:1.5px solid var(--line);font-size:0.8rem;display:flex;align-items:center;gap:7px;transition:border-color 0.2s;background:#fff}
.t-opt input[type=radio]{display:none}
.t-opt.sel{border-color:var(--ink);background:#f9f6f1}
.t-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,0.12)}
/* Products */
.prod-item{border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:12px;background:#fafaf8;position:relative}
.prod-n{font-size:0.68rem;color:var(--pale);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.prod-grid{display:grid;grid-template-columns:2fr 1.2fr;gap:10px}
.img-drop{border:1.5px dashed var(--line);border-radius:7px;padding:14px;text-align:center;cursor:pointer;position:relative;background:#fff;transition:border-color 0.2s;margin-top:10px}
.img-drop:hover{border-color:var(--mid)}
.img-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-prev{width:56px;height:56px;object-fit:cover;border-radius:5px;display:none;margin:0 auto 6px}
.img-lbl{font-size:0.75rem;color:var(--pale)}
.del-btn{position:absolute;top:10px;right:10px;border:1px solid var(--line);background:#fff;color:var(--pale);border-radius:5px;padding:3px 8px;font-size:0.72rem;cursor:pointer}
.del-btn:hover{border-color:var(--red);color:var(--red)}
#add-btn{width:100%;padding:11px;background:transparent;border:1.5px dashed var(--line);border-radius:8px;color:var(--mid);font-family:'Inter',sans-serif;font-size:0.85rem;cursor:pointer;transition:border-color 0.2s}
#add-btn:hover{border-color:var(--ink);color:var(--ink)}
/* Submit */
.submit-btn{width:100%;padding:15px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.2s}
.submit-btn:hover{background:#333}
.submit-hint{font-size:0.75rem;color:var(--pale);text-align:center;margin-top:10px}
/* Progress */
.progress{display:flex;align-items:center;gap:0;margin-bottom:32px}
.prog-step{display:flex;align-items:center;gap:0;flex:1}
.prog-dot{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:600;color:var(--pale);background:#fff;flex-shrink:0;position:relative;z-index:1}
.prog-dot.active{border-color:var(--ink);color:var(--ink)}
.prog-dot.done{border-color:var(--ink);background:var(--ink);color:#fff}
.prog-line{flex:1;height:1px;background:var(--line)}
.prog-line.done-line{background:var(--ink)}
.prog-lbl{display:none}
/* Flash */
.flash-err{background:#fdf2f2;border:1px solid #f5c6c6;color:#c0392b;border-radius:7px;padding:10px 14px;margin-bottom:16px;font-size:0.85rem}
/* Payment */
.pay-box{background:#fafaf8;border:1px solid var(--line);border-radius:10px;padding:20px}
.amount-lg{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--ink);margin:12px 0 4px}
.mpesa-tag{display:inline-flex;align-items:center;gap:6px;background:#006534;color:#fff;font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:5px;margin-bottom:12px}
.pay-btn{width:100%;padding:14px;background:#1a8c3a;color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.2s}
.pay-btn:hover{background:#1a7a32}
.pay-btn:disabled{opacity:0.5;cursor:not-allowed}
.status-msg{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:0.84rem;display:none}
.s-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8}
.s-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}
.s-err{background:#fdf2f2;border:1px solid #f5c6c6;color:#b91c1c}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* Status page */
.status-hero{text-align:center;padding:40px 0 28px}
.status-icon{font-size:3rem;margin-bottom:14px}
.status-hero h1{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;margin-bottom:8px}
.status-hero p{font-size:0.9rem;color:var(--mid);font-weight:300}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;text-decoration:none;margin-bottom:12px;transition:background 0.2s}
.dl-btn:hover{background:#333}
.detail-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:0.84rem}
.detail-row:last-child{border-bottom:none}
.detail-row span:first-child{color:var(--pale)}
.detail-row span:last-child{font-weight:500}
/* Track */
.track-form-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;margin-bottom:20px;text-align:center}
.track-form-card h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:8px}
.track-form-card p{font-size:0.87rem;color:var(--mid);margin-bottom:20px;font-weight:300}
.track-row{display:flex;gap:10px}
.track-row input{flex:1;background:#fafaf8;border:1px solid var(--line);border-radius:7px;padding:11px 14px;font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;color:var(--ink)}
.track-row input:focus{border-color:var(--ink)}
.track-row button{padding:11px 22px;background:var(--ink);color:#fff;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer}
.order-card{border:1px solid var(--line);border-radius:10px;padding:18px 20px;background:#fff;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.order-card-left h3{font-size:0.92rem;font-weight:600;margin-bottom:3px}
.order-card-left p{font-size:0.78rem;color:var(--pale)}
.order-card-badge{font-size:0.7rem;font-weight:600;padding:4px 12px;border-radius:99px}
.badge-paid{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.badge-pending{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.btn-dl-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--ink);color:#fff;border-radius:6px;font-size:0.8rem;font-weight:500;text-decoration:none}
/* Preview page */
.preview-wrap{text-align:center;padding:0 0 24px}
.preview-wrap h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:8px}
.preview-wrap p{font-size:0.87rem;color:var(--mid);margin-bottom:20px;font-weight:300}
.pdf-embed{width:100%;height:520px;border:1px solid var(--line);border-radius:10px;background:#f4f4f4}
.preview-note{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;font-size:0.82rem;color:#78350f;margin-top:14px;margin-bottom:20px;text-align:left}
@media(max-width:520px){.g2{grid-template-columns:1fr}.prod-grid{grid-template-columns:1fr}.track-row{flex-direction:column}.top{padding:0 20px}}
</style>
{% block head %}{% endblock %}
</head>
<body>
<div class="top">
  <a class="logo" href="/">
    <img src="/static/logo.png" alt="CatalogPro" class="logo-img" id="site-logo-img"
         onload="this.style.display='block';document.getElementById('logo-wm').style.display='none'">
    <span id="logo-wm"><span>Catalog</span>Pro</span>
  </a>
  {% block topbadge %}{% endblock %}
  <a class="top-back" href="/">← Home</a>
</div>
<div class="wrap">{% block content %}{% endblock %}</div>
</body>
</html>
